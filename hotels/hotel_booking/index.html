<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز فندق</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="card">
        <div class="hero">
            <h1>🏨 حجز فندقي</h1>
            <p>استمتع بتجربة إقامة مميزة</p>
        </div>

        <div class="form-wrapper">

            <!-- رسائل الخطأ والنجاح -->
            <div id="formMessage" class="message" style="display:none;"></div>

            <div class="step-indicator">
                <div class="step active" data-step="1">
                    <div class="step-circle">1</div>
                    <div class="step-label">معلومات الفندق</div>
                </div>
                <div class="step" data-step="2">
                    <div class="step-circle">2</div>
                    <div class="step-label">تفاصيل الحجز</div>
                </div>
                <div class="step" data-step="3">
                    <div class="step-circle">3</div>
                    <div class="step-label">معلومات النزلاء</div>
                </div>
            </div>

            <form id="bookingForm">

                <!-- الخطوة 1 -->
                <div class="form-section active" data-section="1">
                    <div class="form-group">
                        <label>اسم الفندق *</label>
                        <select id="hotelName" required>
                            <option value="">اختر الفندق</option>
                        </select>
                    </div>
                    <div class="btn-group">
                        <button type="button" class="btn btn-primary" onclick="nextStep()">التالي</button>
                    </div>
                </div>

                <!-- الخطوة 2 -->
                <div class="form-section" data-section="2">
                    <div class="grid-2">
                        <div class="form-group">
                            <label>تاريخ تسجيل الدخول *</label>
                            <input type="date" id="checkInDate" required>
                        </div>
                        <div class="form-group">
                            <label>تاريخ تسجيل الخروج *</label>
                            <input type="date" id="checkOutDate" required>
                        </div>
                    </div>

                    <div class="grid-2">
                        <div class="form-group">
                            <label>وقت تسجيل الدخول *</label>
                            <input type="time" id="checkInTime" required>
                        </div>
                        <div class="form-group">
                            <label>وقت تسجيل الخروج *</label>
                            <input type="time" id="checkOutTime" required>
                        </div>
                    </div>

                    <div class="grid-2">
                        <div class="form-group">
                            <label>عدد الغرف *</label>
                            <input type="number" id="numRooms" min="1" value="1" required>
                        </div>
                        <div class="form-group">
                            <label>عدد الأشخاص *</label>
                            <input type="number" id="numPeople" min="1" value="1" required>
                        </div>
                    </div>

                    <div class="btn-group">
                        <button type="button" class="btn btn-secondary" onclick="prevStep()">السابق</button>
                        <button type="button" class="btn btn-primary" onclick="nextStep()">التالي</button>
                    </div>
                </div>

                <!-- الخطوة 3 -->
                <div class="form-section" data-section="3">
                    <div id="guestsContainer"></div>

                    <div class="add-guest-wrapper">
                        <button type="button" class="btn btn-secondary" onclick="addGuest()">+ إضافة نزيل</button>
                    </div>

                    <div class="btn-group">
                        <button type="button" class="btn btn-secondary" onclick="prevStep()">السابق</button>
                        <button type="submit" class="btn btn-primary">إتمام الحجز</button>
                    </div>
                </div>

            </form>
        </div>
    </div>
</div>

<script src="script.js"></script>
<script src="../../authGuard.js"></script>
</body>
</html>
